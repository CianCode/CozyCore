services:
  postgres:
    image: postgres:17-alpine
    container_name: cozycore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cozycore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cozycore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cozycore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cozycore} -d ${POSTGRES_DB:-cozycore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER:-ciancode/cozycore}/bot:${IMAGE_TAG:-latest}
    container_name: cozycore-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cozycore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cozycore}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
    networks:
      - cozycore-network

  dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER:-ciancode/cozycore}/dashboard:${IMAGE_TAG:-latest}
    container_name: cozycore-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cozycore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cozycore}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${DOMAIN}
      NEXT_PUBLIC_APP_URL: https://${DOMAIN}
      NEXT_PUBLIC_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
    networks:
      - cozycore-network

  nginx:
    image: nginx:alpine
    container_name: cozycore-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - dashboard
    networks:
      - cozycore-network

  certbot:
    image: certbot/certbot
    container_name: cozycore-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:

networks:
  cozycore-network:
    driver: bridge
